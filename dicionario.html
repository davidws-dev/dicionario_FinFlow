<script>
// ================================================================
//  TERMOS – 98+ termos do FinFlow
// ================================================================
const terms = [
  // ---- PROTOCOLO / WEB ----
  { term:"API", full:"Application Programming Interface", cat:"protocol", badge:"Protocolo", meaning:"Conjunto de regras e endpoints que definem como dois sistemas comunicam. Uma API REST expõe URLs que um cliente pode chamar para obter ou enviar dados.", use:"No FinFlow, o backend Spring Boot expõe a API REST em /api/expenses, /api/incomes, etc. Qualquer cliente — browser ou Android — comunica com o servidor através desta API." },
  { term:"REST", full:"Representational State Transfer", cat:"protocol", badge:"Protocolo", meaning:"Estilo arquitectural para sistemas distribuídos baseado em HTTP. Os princípios centrais são: recursos identificados por URLs, verbos HTTP padrão (GET/POST/PUT/DELETE), respostas em JSON, e servidor STATELESS.", use:"O FinFlow segue o padrão REST: /api/expenses é o recurso 'despesas', GET lista-as, POST cria uma, PUT actualiza, DELETE elimina." },
  { term:"HTTP", full:"HyperText Transfer Protocol", cat:"protocol", badge:"Protocolo", meaning:"Protocolo de comunicação da web que define como cliente e servidor trocam mensagens. Cada mensagem tem um método (verbo), um URL, cabeçalhos, e opcionalmente um corpo.", use:"Todos os pedidos do frontend web e Android ao backend usam HTTP/HTTPS. O Spring Boot recebe esses pedidos via Tomcat embutido." },
  { term:"HTTPS", full:"HTTP Secure", cat:"protocol", badge:"Protocolo", meaning:"HTTP com camada de encriptação TLS/SSL. Todo o tráfego entre cliente e servidor é encriptado, impedindo que terceiros leiam os dados em trânsito — incluindo o token JWT.", use:"O backend no Railway serve exclusivamente via HTTPS. O URL base começa em https://." },
  { term:"GET", full:"", cat:"protocol", badge:"Protocolo", meaning:"Verbo HTTP para LEITURA. Pede ao servidor que devolva um recurso. Não tem corpo no pedido. Deve ser idempotente — chamar GET múltiplas vezes não muda nada no servidor.", use:"GET /api/expenses → lista todas as despesas do utilizador autenticado. GET /api/health → verifica se o servidor está activo." },
  { term:"POST", full:"", cat:"protocol", badge:"Protocolo", meaning:"Verbo HTTP para CRIAÇÃO. Envia dados no corpo do pedido para criar um novo recurso. Não é idempotente — chamar POST duas vezes cria dois registos.", use:"POST /api/expenses com o corpo {description, amount, date, categoryId} → cria uma nova despesa na base de dados." },
  { term:"PUT", full:"", cat:"protocol", badge:"Protocolo", meaning:"Verbo HTTP para ACTUALIZAÇÃO TOTAL. Substitui o recurso existente com os dados enviados no corpo. Idempotente — chamar PUT múltiplas vezes com os mesmos dados tem o mesmo efeito.", use:"PUT /api/expenses/42 → actualiza a despesa com id=42 com os novos dados enviados no corpo JSON." },
  { term:"DELETE", full:"", cat:"protocol", badge:"Protocolo", meaning:"Verbo HTTP para ELIMINAÇÃO. Remove o recurso identificado pelo URL. Idempotente — eliminar o mesmo recurso duas vezes tem o mesmo efeito (na segunda, o recurso já não existe).", use:"DELETE /api/expenses/42 → elimina a despesa id=42. O servidor devolve HTTP 204 (No Content) sem corpo na resposta." },
  { term:"OPTIONS", full:"", cat:"protocol", badge:"Protocolo", meaning:"Verbo HTTP enviado automaticamente pelo browser antes de pedidos 'não simples' (ex: com cabeçalho Authorization). Chama-se preflight CORS — o browser pergunta ao servidor 'aceitas pedidos deste domínio?'.", use:"No SecurityConfig, todos os pedidos OPTIONS são permitidos sem autenticação (.requestMatchers(OPTIONS, '/**').permitAll()) para não bloquear o preflight CORS." },
  { term:"JSON", full:"JavaScript Object Notation", cat:"protocol", badge:"Protocolo", meaning:"Formato de texto leve para troca de dados, baseado na sintaxe de objectos JavaScript. Suporta strings, números, booleanos, arrays e objectos aninhados.", use:"Todos os dados trocados entre clientes e o backend FinFlow são JSON. O Jackson (Spring) serializa objectos Java para JSON e vice-versa automaticamente." },
  { term:"TCP", full:"Transmission Control Protocol", cat:"protocol", badge:"Protocolo", meaning:"Protocolo de transporte da internet que garante entrega fiável e ordenada de pacotes de dados entre dois endpoints. O HTTP é construído por cima do TCP.", use:"Cada ligação HTTP ao backend Railway usa TCP. O HikariCP mantém um pool de ligações TCP abertas ao PostgreSQL para evitar o custo de estabelecer uma nova ligação a cada pedido." },
  { term:"URL", full:"Uniform Resource Locator", cat:"protocol", badge:"Protocolo", meaning:"Endereço que identifica um recurso na web. Composto por esquema (https://), domínio, caminho (/api/expenses), e opcionalmente parâmetros de query (?page=1).", use:"O BASE_URL do FinFlow é https://finflow-backend-production-5d94.up.railway.app. Cada endpoint acrescenta um caminho a este URL base." },
  { term:"Header", full:"Cabeçalho HTTP", cat:"protocol", badge:"Protocolo", meaning:"Metadados enviados junto com um pedido ou resposta HTTP. Transportam informações como o tipo de conteúdo (Content-Type), autenticação (Authorization), controlo de cache, e CORS.", use:"Cada pedido autenticado do FinFlow inclui o cabeçalho Authorization: Bearer <token>. O Content-Type: application/json indica que o corpo é JSON." },

  // ---- SEGURANÇA ----
  { term:"JWT", full:"JSON Web Token", cat:"security", badge:"Segurança", meaning:"Token de autenticação stateless composto por três partes em Base64URL separadas por pontos: header (algoritmo), payload (email, emissão, expiração), e signature (HMAC). A assinatura garante que o token não foi adulterado.", use:"No FinFlow, o JwtUtil gera o token no login com validade de 24h. O JwtAuthenticationFilter valida o token em cada pedido às rotas protegidas." },
  { term:"HMAC-SHA", full:"Hash-based Message Authentication Code — Secure Hash Algorithm", cat:"security", badge:"Segurança", meaning:"Algoritmo criptográfico que combina uma chave secreta com uma função de hash (SHA-256/384/512) para gerar uma assinatura. Não é reversível — não se 'descodifica', apenas se verifica re-calculando a assinatura.", use:"A JJWT usa HMAC-SHA (versão determinada pelo tamanho da chave) para assinar os tokens JWT. O jwt.secret do application.properties é a chave secreta." },
  { term:"BCrypt", full:"", cat:"security", badge:"Segurança", meaning:"Algoritmo de hashing de passwords deliberadamente lento, com salt automático incorporado. O salt é um valor aleatório único por password, o que garante que duas passwords iguais geram hashes diferentes.", use:"No AuthService, passwordEncoder.encode(password) gera o hash BCrypt antes de guardar na BD. No login, passwordEncoder.matches(rawPassword, hash) verifica sem 'decifrar'." },
  { term:"CSRF", full:"Cross-Site Request Forgery", cat:"security", badge:"Segurança", meaning:"Ataque onde um site malicioso força o browser do utilizador a enviar um pedido a outro site onde ele está autenticado via cookie. A protecção CSRF adiciona um token extra em formulários para verificar a origem.", use:"No FinFlow, o CSRF está DESACTIVADO (.csrf(csrf -> csrf.disable())) porque a API usa JWT em cabeçalhos, não cookies de sessão. Desactivar CSRF é correcto para APIs REST stateless." },
  { term:"CORS", full:"Cross-Origin Resource Sharing", cat:"security", badge:"Segurança", meaning:"Mecanismo de segurança dos browsers que bloqueia pedidos JavaScript a um domínio diferente do da página, a menos que o servidor do destino autorize explicitamente via cabeçalhos de resposta.", use:"O corsConfigurationSource() no SecurityConfig do FinFlow permite origens *, todos os métodos HTTP, e todos os cabeçalhos. A app Android não sofre de CORS — é uma restrição exclusiva dos browsers." },
  { term:"STATELESS", full:"Sem estado", cat:"security", badge:"Segurança", meaning:"Arquitectura onde o servidor não guarda memória de pedidos anteriores. Cada pedido contém toda a informação necessária para ser processado de forma completamente independente.", use:"O SecurityConfig define SessionCreationPolicy.STATELESS — o servidor nunca cria sessões HTTP. Cada pedido traz o próprio JWT. Permite escalar horizontalmente sem partilha de estado." },
  { term:"Salt", full:"", cat:"security", badge:"Segurança", meaning:"Valor aleatório gerado para cada password antes de fazer o hash. Garante que dois utilizadores com a mesma password têm hashes completamente diferentes na base de dados, impedindo ataques de rainbow table.", use:"O BCrypt incorpora o salt automaticamente no hash gerado. O passwordEncoder.matches() extrai o salt do hash armazenado para verificar a password submetida." },
  { term:"Bearer token", full:"", cat:"security", badge:"Segurança", meaning:"Convenção HTTP onde o token de autenticação é enviado no cabeçalho Authorization com o prefixo 'Bearer ' (com espaço). O servidor extrai o token removendo esse prefixo.", use:"No JwtAuthenticationFilter: authHeader.substring(7) remove os 7 caracteres de 'Bearer ' e extrai o token JWT puro para validação." },
  { term:"JwtUtil", full:"", cat:"security", badge:"Segurança", meaning:"Classe utilitária do FinFlow que gera e valida tokens JWT. Usa a biblioteca JJWT para construir tokens com assinatura HMAC-SHA, extrair o email (subject) do token, e verificar a expiração.", use:"O JwtUtil.generateToken(email) cria um JWT com validade de 24h. O JwtUtil.validateToken(token) é chamado pelo filtro de autenticação em cada pedido. A chave secreta vem do application.properties." },
  { term:"JwtAuthenticationFilter", full:"", cat:"security", badge:"Segurança", meaning:"Filtro Spring Security que interceta pedidos HTTP, extrai o token JWT do cabeçalho Authorization, valida-o com JwtUtil, e, se válido, carrega o utilizador da BD e coloca-o no SecurityContextHolder.", use:"O JwtAuthenticationFilter corre antes de qualquer controlador. Ignora as rotas /api/auth/** e /auth/**. Para os restantes pedidos, se o token for inválido, o filtro bloqueia com 401/403. Se válido, o utilizador fica disponível em todo o contexto da requisição." },
  { term:"SecurityContextHolder", full:"", cat:"security", badge:"Segurança", meaning:"Classe do Spring Security que mantém o contexto de autenticação da thread actual (utilizando ThreadLocal). Contém um Authentication com os detalhes do utilizador autenticado.", use:"Após o JwtAuthenticationFilter validar o token, o objeto User é colocado no SecurityContextHolder. Os serviços podem obter o utilizador autenticado com SecurityContextHolder.getContext().getAuthentication().getPrincipal()." },
  { term:"OWASP", full:"Open Web Application Security Project", cat:"security", badge:"Segurança", meaning:"Organização sem fins lucrativos que publica as melhores práticas e os principais riscos de segurança para aplicações web (OWASP Top 10).", use:"Seguimos as recomendações OWASP para JWT (armazenamento seguro, assinatura HMAC), BCrypt para passwords, desativação de CSRF em APIs stateless, e configuração correta de CORS." },
  { term:"Rainbow Table", full:"", cat:"security", badge:"Segurança", meaning:"Tabela pré-calculada de hashes usada para reverter hashes de passwords rapidamente. A eficácia é reduzida com o uso de salt.", use:"O BCrypt gera um salt aleatório para cada password, tornando as rainbow tables inúteis — mesmo que dois utilizadores tenham a mesma password, os hashes armazenados são completamente diferentes." },
  { term:"Brute Force", full:"", cat:"security", badge:"Segurança", meaning:"Ataque que tenta todas as combinações possíveis de password até encontrar a correta. A lentidão do BCrypt (deliberadamente lento) dificulta este ataque.", use:"O BCrypt é configurado com um fator de custo (ex: 10) que torna cada tentativa de hash demorada (≈0.1s). Isto, combinado com rate limiting (sugerido), protege o FinFlow contra ataques de força bruta." },
  { term:"Enumeração de Utilizadores", full:"", cat:"security", badge:"Segurança", meaning:"Técnica para descobrir se um email está registado com base na resposta do servidor (ex: mensagens diferentes para 'email não encontrado' vs 'password incorreta').", use:"No FinFlow, o endpoint de recuperação de password (não implementado) deveria devolver sempre a mesma mensagem genérica para evitar que um atacante possa enumerar utilizadores válidos." },

  // ---- JAVA / SPRING ----
  { term:"Boilerplate", full:"Código estrutural repetitivo", cat:"java", badge:"Java / Spring", meaning:"Blocos de código que se repetem em vários locais do projeto com pouca ou nenhuma alteração. É o código 'cerimonial' necessário para que o framework funcione, mas que não contém lógica de negócio específica. O Spring Boot foi criado para reduzir este boilerplate.", use:"No FinFlow, o boilerplate inclui: a estrutura de pastas gerada pelo Spring Initializr, o ficheiro pom.xml, os getters/setters manuais das entidades (sem Lombok), a configuração base do SecurityConfig, e a repetição de anotações JPA como @Entity, @Id e @Column em cada modelo." },
  { term:"Spring Boot", full:"", cat:"java", badge:"Java / Spring", meaning:"Framework Java que simplifica o desenvolvimento de aplicações Spring com configuração automática, servidor embutido, e starters. Elimina a configuração XML manual e o deployment em servidor externo.", use:"O backend FinFlow é uma aplicação Spring Boot 3.5. O FinflowBackendApplication.java com @SpringBootApplication é o ponto de entrada que arranca o servidor Tomcat embutido." },
  { term:"Spring Initializr", full:"", cat:"java", badge:"Java / Spring", meaning:"Ferramenta web (start.spring.io) que gera a estrutura base de um projecto Spring Boot com as dependências escolhidas. Produz um zip com o pom.xml, a classe principal, e a estrutura de pastas.", use:"O FinFlow foi iniciado com o Spring Initializr, seleccionando Spring Web, Spring Data JPA, Spring Security e PostgreSQL. O projecto gerado serviu de base para todo o desenvolvimento." },
  { term:"@SpringBootApplication", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação que combina @Configuration, @EnableAutoConfiguration e @ComponentScan. É o ponto de entrada da aplicação Spring Boot.", use:"A classe FinflowBackendApplication.java está anotada com @SpringBootApplication. O método main() chama SpringApplication.run() para iniciar o contexto Spring e o servidor embutido." },
  { term:"@ComponentScan", full:"", cat:"java", badge:"Java / Spring", meaning:"Instrui o Spring a varrer os pacotes especificados em busca de beans (@Service, @Controller, @Repository, etc.) e registá-los no IoC container.", use:"O @SpringBootApplication já inclui @ComponentScan implicitamente, escaneando o pacote raiz e subpacotes. Assim, todos os nossos componentes são detetados automaticamente." },
  { term:"Injeção de Dependências (DI)", full:"Dependency Injection", cat:"java", badge:"Java / Spring", meaning:"Padrão de design onde o framework (Spring) cria e fornece as dependências de um objeto, em vez de o próprio objeto as instanciar com 'new'. Promove baixo acoplamento e facilita testes.", use:"Usamos @Autowired para injetar repositórios nos serviços (ex: @Autowired ExpenseRepository). O Spring cria as instâncias e injeta-as automaticamente, sem que precisemos de instanciar com new." },
  { term:"IoC Container", full:"Inversion of Control Container", cat:"java", badge:"Java / Spring", meaning:"Contentor do Spring que gere o ciclo de vida dos beans (criação, configuração, e destruição). A inversão de controlo significa que o framework controla as instâncias, não o programador.", use:"O ApplicationContext, criado por SpringApplication.run(), é o IoC container do FinFlow. Todos os beans (JwtUtil, UserService, etc.) são geridos por este container." },
  { term:"Bean", full:"", cat:"java", badge:"Java / Spring", meaning:"Objecto gerido pelo contentor de injecção de dependências do Spring (ApplicationContext). O Spring cria, configura, e gere o ciclo de vida dos beans automaticamente.", use:"BCryptPasswordEncoder, JwtUtil, JwtAuthenticationFilter são todos beans. A anotação @Bean no SecurityConfig regista-os. @Service, @Component, @Repository também criam beans." },
  { term:"Tomcat", full:"Apache Tomcat", cat:"java", badge:"Java / Spring", meaning:"Servidor de aplicações Java (servlet container) que processa pedidos HTTP. No Spring Boot, está embutido no JAR da aplicação — não é necessário instalar separadamente.", use:"Quando o FinFlow arranca com java -jar, o Tomcat embutido inicia na porta ${PORT:8080}, começa a aceitar pedidos HTTP, e entrega-os ao Spring MVC para processamento." },
  { term:"MVC", full:"Model-View-Controller", cat:"java", badge:"Java / Spring", meaning:"Padrão arquitectural que separa a aplicação em três camadas: Model (dados e lógica de negócio), View (apresentação), e Controller (recebe pedidos e coordena). No Spring Boot REST, a View é substituída por JSON.", use:"Os @RestController do FinFlow são a camada Controller. Os @Service são o Model (lógica). Como é uma API REST, não há View — o Jackson serializa os objectos para JSON." },
  { term:"Jackson", full:"", cat:"java", badge:"Java / Spring", meaning:"Biblioteca Java para serialização/deserialização de JSON. Converte automaticamente objectos Java em JSON (para a resposta HTTP) e JSON em objectos Java (do corpo do pedido).", use:"@RequestBody ExpenseRequest usa o Jackson para converter o corpo JSON do pedido em objecto Java. @ResponseBody (incluído em @RestController) converte os objectos Java devolvidos em JSON." },
  { term:"JPA", full:"Jakarta Persistence API", cat:"java", badge:"Java / Spring", meaning:"Especificação Java que define como objectos Java são mapeados para tabelas relacionais (ORM). Define anotações como @Entity, @Table, @Column, @ManyToOne. O Hibernate é a implementação mais comum.", use:"Todas as entidades do FinFlow (User, Expense, Income, Goal, etc.) usam anotações JPA. Spring Data JPA adiciona repositórios automáticos em cima do JPA/Hibernate." },
  { term:"Hibernate", full:"", cat:"java", badge:"Java / Spring", meaning:"Implementação do JPA — o ORM (Object-Relational Mapper) que traduz operações em objectos Java para SQL e executa-o na base de dados. Gera automaticamente queries SELECT, INSERT, UPDATE, DELETE.", use:"O Hibernate é activado via spring-boot-starter-data-jpa. Com ddl-auto=update, analisa as entidades e actualiza o esquema da BD no arranque. O show-sql=true mostra o SQL gerado nos logs." },
  { term:"ORM", full:"Object-Relational Mapping", cat:"java", badge:"Java / Spring", meaning:"Técnica que mapeia objectos de uma linguagem orientada a objectos (Java) para tabelas de uma base de dados relacional. Elimina a necessidade de escrever SQL manualmente para operações CRUD.", use:"O Hibernate é o ORM do FinFlow. A classe Expense em Java mapeia para a tabela expenses no PostgreSQL. O Hibernate gera o SQL correspondente automaticamente." },
  { term:"@Autowired", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação Spring que activa injecção de dependências automática. O Spring encontra o bean do tipo correcto no contexto e injeta-o no campo anotado.", use:"Nos serviços do FinFlow: @Autowired ExpenseRepository expenseRepository — o Spring injeta automaticamente a implementação gerada do repositório." },
  { term:"@Transactional", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação que garante que um método corre dentro de uma transacção de base de dados. Se qualquer operação falhar, todas as alterações são revertidas (rollback). readOnly=true optimiza transacções apenas de leitura.", use:"Usado no CreditCardService com @Transactional(readOnly = true) nos métodos de leitura. Garante consistência em operações que envolvem múltiplos passos na BD." },
  { term:"DTO", full:"Data Transfer Object", cat:"java", badge:"Java / Spring", meaning:"Classe simples que define exactamente que dados entram ou saem da API, separada das entidades internas. Evita expor campos sensíveis e desacopla o contrato público da estrutura interna.", use:"LoginRequest, ExpenseRequest, DashboardResponse são DTOs do FinFlow. O cliente envia categoryId (inteiro), o DTO recebe-o, e o serviço resolve o objecto Category da BD." },
  { term:"@PrePersist", full:"", cat:"java", badge:"Java / Spring", meaning:"Callback JPA executado pelo Hibernate imediatamente antes do primeiro INSERT de uma entidade nova. Permite inicializar campos automaticamente sem intervenção do programador.", use:"Na entidade User: @PrePersist define createdAt, updatedAt = LocalDateTime.now() e active = true. Na Expense: define as duas datas. Corre automaticamente em cada save()." },
  { term:"@PreUpdate", full:"", cat:"java", badge:"Java / Spring", meaning:"Callback JPA executado pelo Hibernate imediatamente antes de uma entidade ser actualizada (UPDATE). Permite actualizar campos como updatedAt automaticamente.", use:"Na entidade User, o método anotado com @PreUpdate define updatedAt = LocalDateTime.now() sempre que o utilizador é modificado. Assim, a data de última actualização é mantida sem código adicional nos serviços." },
  { term:"@JsonIgnoreProperties", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação Jackson que especifica propriedades a ignorar durante a serialização/desserialização JSON. Usada para evitar erros de recursão ou exposição de campos internos do Hibernate.", use:"Nas entidades JPA, como User e Expense, adiciona-se @JsonIgnoreProperties({\"hibernateLazyInitializer\", \"handler\"}) para evitar que o Jackson tente serializar os proxies lazy do Hibernate, o que causaria excepções." },
  { term:"@JsonProperty(access = WRITE_ONLY)", full:"", cat:"java", badge:"Java / Spring", meaning:"Configuração do Jackson que indica que o campo deve ser aceite na desserialização (escrita) mas nunca incluído na serialização (leitura).", use:"No modelo User, o campo password está anotado com @JsonProperty(access = WRITE_ONLY). Assim, a password é aceite no registo/login, mas nunca aparece nas respostas JSON." },
  { term:"@Column(updatable = false)", full:"", cat:"java", badge:"Java / Spring", meaning:"Configuração JPA que impede que uma coluna seja actualizada em operações UPDATE. Mantém o valor original após a criação.", use:"Todas as entidades usam @Column(updatable = false) no campo createdAt. Assim, a data de criação nunca é sobrescrita por engano." },
  { term:"@JoinColumn", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação JPA que especifica a coluna de chave estrangeira numa relação entre entidades. Pode definir o nome da coluna, se é nullable, etc.", use:"Em Expense, a relação @ManyToOne @JoinColumn(name = \"user_id\") define que a coluna user_id na tabela expenses é a chave estrangeira para users.id." },
  { term:"@GeneratedValue(strategy = IDENTITY)", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação JPA que define a estratégia de geração da chave primária. IDENTITY delega a geração para a base de dados (auto-incremento).", use:"Todas as entidades (User, Expense, Income, etc.) usam @GeneratedValue(strategy = GenerationType.IDENTITY) no campo id, fazendo com que o PostgreSQL gere o valor automaticamente com SERIAL." },
  { term:"FetchType (LAZY vs EAGER)", full:"", cat:"java", badge:"Java / Spring", meaning:"Estratégia de carregamento de relacionamentos JPA. LAZY só carrega os dados quando acedidos (mais eficiente), EAGER carrega imediatamente com a entidade principal.", use:"Na Expense, usamos fetch = FetchType.LAZY para User e Category, para que apenas as despesas sejam carregadas inicialmente. Já em Income, o padrão EAGER é usado para simplificar." },
  { term:"@ManyToOne", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação JPA que define uma relação N-para-1 entre entidades: muitas instâncias da entidade filha estão associadas a uma instância da entidade pai. Cria uma coluna de chave estrangeira na tabela filha.", use:"Na Expense: @ManyToOne @JoinColumn(name='user_id') User user — muitas despesas pertencem a um utilizador. Gera a coluna user_id na tabela expenses com FK para users.id." },
  { term:"BigDecimal", full:"", cat:"java", badge:"Java / Spring", meaning:"Tipo Java para números decimais com precisão exacta arbitrária. Ao contrário de double/float (ponto flutuante binário), não tem erros de arredondamento. Suporta controlo explícito do modo de arredondamento.", use:"Todos os campos de valor monetário no FinFlow (amount em Expense, Income, Goal, CreditCard) usam BigDecimal. 0.1 + 0.2 com BigDecimal dá exactamente 0.3, não 0.30000000000000004." },
  { term:"Stream API", full:"Java Stream API", cat:"java", badge:"Java / Spring", meaning:"API funcional do Java 8+ para processar colecções de forma declarativa. Permite encadear operações como map, filter, reduce, collect, sorted, limit sem loops explícitos.", use:"No DashboardService: incomes.stream().map(Income::getAmount).reduce(BigDecimal.ZERO, BigDecimal::add) — soma todos os valores de receita. Stream.concat() junta as duas listas de transacções." },
  { term:"Optional", full:"java.util.Optional", cat:"java", badge:"Java / Spring", meaning:"Contentor que pode ou não conter um valor. Substitui valores null explícitos e força o programador a tratar o caso de 'não encontrado' explicitamente, evitando NullPointerException.", use:"Os repositórios do FinFlow devolvem Optional<Expense> nos métodos findById. O controlador usa .map(ResponseEntity::ok).orElse(ResponseEntity.notFound().build()) para devolver 200 ou 404." },
  { term:"JAR", full:"Java ARchive", cat:"java", badge:"Java / Spring", meaning:"Ficheiro comprimido (ZIP) que empacota classes Java compiladas, recursos, e metadados numa única unidade executável. O Maven gera o JAR no directório target/ com mvn package.", use:"O Railway executa java -jar target/finflow-backend.jar. O JAR inclui o Tomcat embutido, todas as dependências, e os ficheiros de configuração — é o artefacto de deploy completo." },
  { term:"Maven", full:"Apache Maven", cat:"java", badge:"Java / Spring", meaning:"Ferramenta de build e gestão de dependências para Java. O pom.xml define o projecto, as dependências (starters), plugins, e o processo de build. Descarrega bibliotecas do Maven Central automaticamente.", use:"O FinFlow usa Maven. O ficheiro mvnw (Maven Wrapper) permite correr ./mvnw clean package sem ter o Maven instalado. O Railway usa este comando para construir o JAR." },
  { term:"pom.xml", full:"Project Object Model", cat:"java", badge:"Java / Spring", meaning:"Ficheiro de configuração central do Maven. Define o grupo, artefacto, versão, dependências (starters), plugins de build, e propriedades. O Maven lê este ficheiro para gerir o ciclo de vida do projecto.", use:"O pom.xml do FinFlow contém as dependências do Spring Boot, o driver PostgreSQL, a biblioteca JJWT para JWT, e o plugin spring-boot-maven-plugin para criar o JAR executável." },
  { term:"mvnw / mvnw.cmd", full:"Maven Wrapper", cat:"java", badge:"Java / Spring", meaning:"Script que descarrega e executa a versão correcta do Maven sem necessidade de instalação global. Garante que todos os developers usam a mesma versão.", use:"O Railway usa ./mvnw clean package para compilar o FinFlow. O ficheiro mvnw está no repositório, permitindo builds consistentes em qualquer ambiente." },
  { term:"RoundingMode", full:"", cat:"java", badge:"Java / Spring", meaning:"Enumeração do Java que define modos de arredondamento para operações com BigDecimal, como HALF_UP (arredondamento padrão: .5 para cima), DOWN, CEILING, etc. Essencial para cálculos financeiros com precisão.", use:"No DashboardService, a percentagem despesas/receitas é calculada com totalDespesas.divide(totalReceitas, 2, RoundingMode.HALF_UP) — arredonda para 2 casas decimais com o modo tradicional." },
  { term:"@RestController", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação Spring que marca uma classe como controlador REST. Combina @Controller e @ResponseBody: todos os métodos devolvem JSON (ou outro formato) em vez de views HTML.", use:"Todos os controladores do FinFlow (AuthController, ExpenseController, IncomeController, etc.) são anotados com @RestController. Cada método retorna um objeto Java que o Jackson serializa para JSON e envia como resposta HTTP." },
  { term:"@RequestMapping", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação Spring que mapeia um pedido HTTP a um método de controlador ou a toda a classe. Pode definir o caminho, o método HTTP, cabeçalhos, etc. Usada como base para as anotações específicas @GetMapping, @PostMapping, etc.", use:"No AuthController, a classe tem @RequestMapping(\"/api/auth\") e os métodos usam @PostMapping(\"/login\") e @PostMapping(\"/register\") — o caminho final é /api/auth/login e /api/auth/register." },
  { term:"@PathVariable", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação Spring que vincula uma variável do URL (ex: {id}) a um parâmetro do método do controlador. Extrai o valor da string e converte-o para o tipo do parâmetro (Long, String, etc.).", use:"No ExpenseController, o método updateExpense(@PathVariable Long id, @RequestBody ExpenseRequest request) recebe o id do URL /api/expenses/42 e o corpo JSON, e actualiza a despesa com esse ID." },
  { term:"@RequestBody", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação Spring que vincula o corpo da requisição HTTP (JSON) a um objeto Java. Usa o Jackson para desserializar automaticamente o JSON para o DTO ou entidade especificado.", use:"No AuthController, @RequestBody LoginRequest loginRequest recebe o JSON {email, password} enviado no pedido POST /api/auth/login e converte-o para o objeto LoginRequest. O corpo do pedido é então validado e usado no serviço." },
  { term:"@ExceptionHandler", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação Spring que marca um método de controlador para tratar excepções específicas lançadas em métodos da mesma classe (ou globalmente com @ControllerAdvice). Permite devolver respostas HTTP personalizadas.", use:"No AuthController, um método com @ExceptionHandler(RuntimeException.class) captura qualquer RuntimeException (ex: 'Email já existe') e devolve 401 com um JSON {error: mensagem}. Isso evita que o Spring devolva um 500 genérico." },
  { term:"@ResponseStatus", full:"", cat:"java", badge:"Java / Spring", meaning:"Anotação que define o código de status HTTP que deve ser devolvido quando uma excepção é lançada. Pode ser usada em classes de excepção personalizadas para associar um status fixo.", use:"A classe ResourceNotFoundException do FinFlow está anotada com @ResponseStatus(HttpStatus.NOT_FOUND). Quando o serviço lança esta excepção, o Spring automaticamente devolve HTTP 404 com a mensagem da excepção." },
  { term:"ResourceNotFoundException", full:"", cat:"java", badge:"Java / Spring", meaning:"Excepção personalizada que estende RuntimeException, usada para indicar que um recurso solicitado (despesa, receita, etc.) não foi encontrado na base de dados. Lançada nos serviços quando um findByIdAndUser devolve Optional.empty().", use:"No ExpenseService, se expenseRepository.findByIdAndUser(id, currentUser) devolver Optional.empty(), lança-se new ResourceNotFoundException(\"Despesa não encontrada\"). O controlador devolve 404 graças a @ResponseStatus." },
  { term:"JUnit", full:"", cat:"java", badge:"Java / Spring", meaning:"Framework de testes unitários para Java. Permite escrever testes automatizados com anotações @Test, @BeforeEach, etc. Integrado com o Maven e o Spring Boot Test Starter.", use:"O FinFlow tem testes unitários planeados para os serviços (DashboardService, ExpenseService) usando JUnit 5. O spring-boot-starter-test inclui JUnit por defeito." },
  { term:"Mockito", full:"", cat:"java", badge:"Java / Spring", meaning:"Framework para criar objetos simulados (mocks) em testes unitários. Permite isolar a unidade a testar, simulando dependências como repositórios.", use:"Em testes do FinFlow, usaríamos Mockito para simular ExpenseRepository e controlar os dados devolvidos, testando assim a lógica do ExpenseService sem aceder à BD real." },

  // ---- BASE DE DADOS ----
  { term:"PostgreSQL", full:"", cat:"db", badge:"Base de dados", meaning:"Sistema de gestão de base de dados relacional open-source, conhecido pela robustez, conformidade SQL, e suporte a tipos de dados avançados como TEXT sem limite, JSONB, e arrays.", use:"Base de dados de produção do FinFlow, alojada no Railway. Armazena as tabelas users, expenses, incomes, goals, categories, credit_cards. Acedida via JDBC com o driver postgresql no pom.xml." },
  { term:"JDBC", full:"Java Database Connectivity", cat:"db", badge:"Base de dados", meaning:"API Java padrão para comunicação com bases de dados relacionais. Define interfaces como Connection, Statement, ResultSet. O driver específico de cada BD (ex: postgresql.jar) implementa estas interfaces.", use:"O HikariCP abre ligações JDBC ao PostgreSQL. O Hibernate usa JDBC internamente para executar as queries geradas. O spring.datasource.url configura o URL de ligação JDBC." },
  { term:"HikariCP", full:"Hikari Connection Pool", cat:"db", badge:"Base de dados", meaning:"Pool de ligações JDBC de alto desempenho incluído por defeito no Spring Boot. Mantém um conjunto de ligações TCP abertas ao PostgreSQL e reutiliza-as, evitando o custo de estabelecer uma nova ligação para cada pedido HTTP.", use:"Configurado no application.properties: maximum-pool-size=5, initializationFailTimeout=-1 (aguarda indefinidamente pela BD no arranque — crítico para Railway onde a BD pode iniciar mais tarde que a app)." },
  { term:"ddl-auto", full:"Data Definition Language — auto configuration", cat:"db", badge:"Base de dados", meaning:"Propriedade do Hibernate que controla o que acontece ao esquema da BD no arranque. 'update': adiciona colunas/tabelas que faltam, nunca apaga dados. 'validate': só verifica. 'create': recria tudo. 'none': não faz nada.", use:"O FinFlow usa ddl-auto=update. Permite evoluir as entidades (ex: adicionar campo bio ao User) sem SQL manual — o Hibernate emite ALTER TABLE automaticamente no próximo arranque." },
  { term:"Flyway", full:"", cat:"db", badge:"Base de dados", meaning:"Ferramenta de migração de bases de dados baseada em scripts SQL versionados (V1__create_tables.sql, V2__add_column.sql). Regista que migrações já foram executadas e aplica apenas as novas.", use:"Não usado no FinFlow (usa ddl-auto=update em vez disso). Em produção empresarial, Flyway seria preferível — dá controlo total e histórico auditável de cada alteração ao esquema, com suporte a rollback." },
  { term:"Rollback", full:"", cat:"db", badge:"Base de dados", meaning:"Operação que reverte todas as alterações feitas numa transacção de base de dados quando ocorre um erro. Garante que a BD não fica num estado parcialmente actualizado (inconsistente).", use:"Com @Transactional no Spring, se uma excepção for lançada durante uma operação que envolve múltiplos passos na BD, o Spring faz rollback automático de todas as alterações feitas nessa transacção." },
  { term:"SERIAL / BIGSERIAL", full:"", cat:"db", badge:"Base de dados", meaning:"Tipos de dados do PostgreSQL para chaves primárias auto-incrementadas. SERIAL usa INTEGER (até 2 mil milhões), BIGSERIAL usa BIGINT (até 9 quintilhões).", use:"O Hibernate mapeia @GeneratedValue(strategy = IDENTITY) para SERIAL no PostgreSQL. As tabelas do FinFlow usam BIGSERIAL (id BIGINT) para maior capacidade." },
  { term:"VARCHAR vs TEXT", full:"", cat:"db", badge:"Base de dados", meaning:"Tipos de texto no PostgreSQL. VARCHAR(n) limita o texto a n caracteres, enquanto TEXT não tem limite de tamanho (apenas o máximo da BD).", use:"O campo avatar_url foi alterado de VARCHAR(255) para TEXT para suportar URLs de imagens em Base64, que podem ter milhares de caracteres." },
  { term:"Constraint (Restrição)", full:"", cat:"db", badge:"Base de dados", meaning:"Regras aplicadas a colunas para garantir a integridade dos dados: NOT NULL, UNIQUE, PRIMARY KEY, FOREIGN KEY, CHECK, etc.", use:"No FinFlow, a tabela users tem UNIQUE em email, NOT NULL em vários campos, e FOREIGN KEY em todas as relações (ex: expenses.user_id referencia users.id)." },
  { term:"DDL (Data Definition Language)", full:"", cat:"db", badge:"Base de dados", meaning:"Subconjunto do SQL usado para definir ou modificar a estrutura da base de dados: CREATE, ALTER, DROP, TRUNCATE, etc.", use:"O Hibernate com ddl-auto=update gera DDL (ALTER TABLE, CREATE TABLE) automaticamente. Durante o desenvolvimento, também executámos ALTER TABLE manualmente para remover colunas obsoletas." },
  { term:"DML (Data Manipulation Language)", full:"", cat:"db", badge:"Base de dados", meaning:"Subconjunto do SQL para manipular dados: SELECT, INSERT, UPDATE, DELETE. O Hibernate gera DML automaticamente a partir das operações nos repositórios.", use:"O Hibernate gera INSERT para save(), UPDATE para modificações de entidades, DELETE para delete(), e SELECT para findById e métodos derivados." },
  { term:"ALTER TABLE", full:"", cat:"db", badge:"Base de dados", meaning:"Comando SQL para modificar a estrutura de uma tabela existente (adicionar, remover ou alterar colunas, constraints, etc.).", use:"Durante o projeto, usámos ALTER TABLE para remover a coluna due_date (obsoleta) e alterar avatar_url para TEXT." },
  { term:"DROP COLUMN", full:"", cat:"db", badge:"Base de dados", meaning:"Comando SQL que remove uma coluna de uma tabela. Pode ser irreversível se não houver backup.", use:"Removemos colunas obsoletas como client_id, invoice_number e due_date que estavam nas tabelas antigas, simplificando o esquema." },
  { term:"JpaRepository", full:"", cat:"db", badge:"Base de dados", meaning:"Interface do Spring Data JPA que estende PagingAndSortingRepository e fornece métodos CRUD prontos a usar (save, findById, findAll, delete, etc.) para uma entidade e o tipo da sua chave primária.", use:"Os repositórios do FinFlow (UserRepository, ExpenseRepository, IncomeRepository, etc.) estendem JpaRepository<Entidade, Long>. O Spring gera automaticamente a implementação em runtime, incluindo o SQL correspondente a cada método." },

  // ---- FRONTEND ----
  { term:"Fetch API", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"API nativa dos browsers modernos para fazer pedidos HTTP de forma assíncrona com Promises. Substitui o XMLHttpRequest antigo com uma sintaxe mais limpa baseada em async/await.", use:"O api.js do FinFlow usa fetch() para todos os pedidos ao backend. Exemplo: fetch(url, {method:'POST', headers:{Authorization:'Bearer '+token}, body: JSON.stringify(data)})." },
  { term:"LocalStorage", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"Mecanismo de armazenamento de pares chave-valor no browser, persistente entre sessões (não se perde ao fechar o tab). Limitado a strings. Acessível apenas pelo domínio que o criou.", use:"O frontend web do FinFlow guarda o JWT em localStorage com as chaves 'token' e 'finflow_token'. O api.js lê estas chaves em cada pedido para montar o cabeçalho Authorization." },
  { term:"Promise", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"Objecto JavaScript que representa o resultado eventual de uma operação assíncrona. Pode estar pendente, resolvida (com valor), ou rejeitada (com erro). Encadeável com .then() e .catch(), ou com async/await.", use:"O fetch() devolve uma Promise. O despesas.js usa Promise.all([getIncomes(), getExpenses()]) para fazer os dois pedidos em paralelo — tempo total = o mais lento, não a soma dos dois." },
  { term:"Chart.js", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"Biblioteca JavaScript open-source para criar gráficos interactivos em HTML5 Canvas. Suporta linha, barra, pizza, doughnut, radar, entre outros. Carregada via CDN.", use:"O dashboard.js do FinFlow usa Chart.js para renderizar o gráfico de linha com dois datasets (Entradas / Saídas). O método canvas.toDataURL() exporta o gráfico como imagem PNG para o PDF." },
  { term:"Base64", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"Sistema de codificação que converte dados binários (como uma imagem) em texto ASCII. Aumenta o tamanho em ~33% mas permite incluir dados binários em contextos que só aceitam texto (JSON, CSS, HTML).", use:"As fotos de perfil do FinFlow são convertidas para base64 no browser com FileReader.readAsDataURL(). A string resultante é enviada como JSON e guardada no campo avatar_url (TEXT) do PostgreSQL." },
  { term:"async / await", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"Sintaxe para lidar com Promises de forma síncrona e legível. async define uma função que devolve Promise; await pausa a execução até a Promise resolver.", use:"O api.js define async function apiRequest() e usa await fetch(...). Isso permite escrever código assíncrono como se fosse síncrono, facilitando a leitura e o tratamento de erros." },
  { term:"Promise.all()", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"Método que recebe um array de Promises e aguarda que todas sejam resolvidas. Devolve um array com os resultados. Se uma falha, a Promise resultante é rejeitada.", use:"Em despesas.js, usamos Promise.all([getIncomes(), getExpenses()]) para carregar receitas e despesas em simultâneo. Isso reduz o tempo de espera total." },
  { term:"try / catch", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"Bloco para capturar e tratar exceções. O código dentro do try é executado; se lançar uma exceção, o fluxo passa para o catch, onde pode ser tratada.", use:"Em api.js, envolvemos a chamada fetch com try/catch para lidar com erros de rede e respostas HTTP não-OK. A UI mostra uma mensagem de erro amigável." },
  { term:"FileReader", full:"", cat:"frontend", badge:"Frontend / JS", meaning:"API do browser para ler o conteúdo de ficheiros locais (imagens, texto) de forma assíncrona, sem enviar para o servidor.", use:"Em perfil.html, usamos FileReader para ler a imagem selecionada e convertê-la para Base64 com readAsDataURL(), antes do upload para o backend." },

// ===== LÓGICA DE RENDERIZAÇÃO =====
let activeFilter = 'all';
let searchVal = '';

function renderDict() {
  const grid = document.getElementById('dict-grid');
  const countEl = document.getElementById('dict-count');
  const q = searchVal.toLowerCase();
  const filtered = terms.filter(t => {
    const catOk = activeFilter === 'all' || t.cat === activeFilter;
    const textOk = !q || t.term.toLowerCase().includes(q) || t.meaning.toLowerCase().includes(q) || (t.full && t.full.toLowerCase().includes(q));
    return catOk && textOk;
  });
  countEl.textContent = filtered.length + ' termos' + (q ? ' para "' + searchVal + '"' : '');
  grid.innerHTML = filtered.map(t => `
    <div class="dict-card">
      <div class="dict-card-head">
        <span class="dict-term">${t.term}</span>
        <span class="dict-badge badge-${t.cat}">${t.badge}</span>
      </div>
      ${t.full ? `<div class="dict-full">${t.full}</div>` : ''}
      <div class="dict-meaning">${t.meaning}</div>
      <div class="dict-use"><strong>No FinFlow:</strong> ${t.use}</div>
    </div>
  `).join('');
}

function filterDict() {
  searchVal = document.getElementById('dict-search').value;
  renderDict();
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDict();
}

renderDict();
</script>
