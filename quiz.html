// ================================================================
//  FUNÇÃO PARA EMBARALHAR AS OPÇÕES DE UMA PERGUNTA
// ================================================================
function shuffleQuestionOptions(q) {
  // Cria um array com cada opção e um marcador booleano
  const items = q.options.map((text, idx) => ({
    text,
    isCorrect: idx === q.correct
  }));

  // Embaralha (Fisher-Yates)
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }

  // Extrai as opções embalhadas
  const newOptions = items.map(item => item.text);
  // Encontra o novo índice da resposta correta
  const newCorrect = items.findIndex(item => item.isCorrect);

  // Retorna uma nova cópia da pergunta com as opções reorganizadas
  return { ...q, options: newOptions, correct: newCorrect };
}

const app = {
  filteredQuestions: [],
  currentIndex: 0,
  score: 0,
  answered: false,
  selectedTopic: 'all',
  totalQuestions: 0,

  // DOM refs
  el: {
    filterBar: document.getElementById('filterBar'),
    gameArea: document.getElementById('gameArea'),
    resultArea: document.getElementById('resultArea'),
    progress: document.getElementById('progress'),
    scoreDisplay: document.getElementById('scoreDisplay'),
    questionText: document.getElementById('questionText'),
    optionsContainer: document.getElementById('optionsContainer'),
    feedback: document.getElementById('feedback'),
    explanationText: document.getElementById('explanationText'),
    tipText: document.getElementById('tipText'),
    nextBtn: document.getElementById('nextBtn'),
    resetBtn: document.getElementById('resetBtn'),
    finalScore: document.getElementById('finalScore'),
    finalDetail: document.getElementById('finalDetail'),
    perTopicStats: document.getElementById('perTopicStats'),
    restartFromResult: document.getElementById('restartFromResult'),
  },

  init() {
    this.setupFilters();
    this.setupButtons();
    this.loadQuestions('all');
    this.renderQuestion();
  },

  setupFilters() {
    const buttons = this.el.filterBar.querySelectorAll('.filter-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.selectedTopic = btn.dataset.topic;
        this.loadQuestions(this.selectedTopic);
        this.currentIndex = 0;
        this.score = 0;
        this.renderQuestion();
        this.el.resultArea.style.display = 'none';
        this.el.gameArea.style.display = 'block';
        this.el.resetBtn.style.display = 'none';
      });
    });
  },

  setupButtons() {
    this.el.nextBtn.addEventListener('click', () => this.nextQuestion());
    this.el.resetBtn.addEventListener('click', () => this.resetQuiz());
    this.el.restartFromResult.addEventListener('click', () => this.resetQuiz());
  },

  loadQuestions(topic) {
    if (topic === 'all') {
      this.filteredQuestions = [...questions];
    } else {
      this.filteredQuestions = questions.filter(q => q.topic === topic);
    }
    // Embaralhar as perguntas para evitar viés de ordem
    this.filteredQuestions = this.shuffleArray(this.filteredQuestions);
    this.totalQuestions = this.filteredQuestions.length;
    this.currentIndex = 0;
    this.score = 0;
  },

  shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  },

  renderQuestion() {
    if (this.totalQuestions === 0) {
      this.el.questionText.textContent = 'Nenhuma pergunta disponível para este tema.';
      this.el.optionsContainer.innerHTML = '';
      this.el.feedback.classList.remove('show');
      this.el.nextBtn.disabled = true;
      this.el.progress.textContent = '0 perguntas';
      return;
    }

    // Pega a pergunta atual e EMBARALHA AS OPÇÕES
    let q = this.filteredQuestions[this.currentIndex];
    q = shuffleQuestionOptions(q);  // <-- AQUI ESTÁ A NOVIDADE

    this.el.progress.textContent = `Pergunta ${this.currentIndex+1} de ${this.totalQuestions}`;
    this.el.scoreDisplay.textContent = `✅ ${this.score}`;
    this.el.questionText.textContent = q.question;

    // Opções
    const letters = ['A', 'B', 'C', 'D'];
    let html = '';
    q.options.forEach((opt, idx) => {
      html += `
        <div class="option" data-index="${idx}">
          <span class="letter">${letters[idx]}.</span>
          <span>${opt}</span>
        </div>
      `;
    });
    this.el.optionsContainer.innerHTML = html;

    // Remover feedback
    this.el.feedback.classList.remove('show');
    this.el.nextBtn.disabled = true;
    this.answered = false;

    // Guardar a pergunta (já com opções embaralhadas) para usar no handleOptionClick
    this.currentQuestion = q;

    // Adicionar listeners
    this.el.optionsContainer.querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', () => this.handleOptionClick(el));
    });
  },

  handleOptionClick(el) {
    if (this.answered) return;
    this.answered = true;

    const q = this.currentQuestion;
    const selected = parseInt(el.dataset.index);
    const isCorrect = (selected === q.correct);

    if (isCorrect) this.score++;

    // Desabilitar todas as opções
    const allOpts = this.el.optionsContainer.querySelectorAll('.option');
    allOpts.forEach(opt => opt.classList.add('disabled'));

    // Marcar correta
    allOpts[q.correct].classList.add('correct');
    // Marcar errada se for o caso
    if (!isCorrect) {
      el.classList.add('wrong');
    }

    // Mostrar feedback
    this.el.explanationText.textContent = q.explanation;
    this.el.tipText.textContent = `💡 Dica: ${q.tip}`;
    this.el.feedback.classList.add('show');

    // Atualizar score
    this.el.scoreDisplay.textContent = `✅ ${this.score}`;

    // Ativar botão próximo
    this.el.nextBtn.disabled = false;
  },

  nextQuestion() {
    if (this.currentIndex + 1 < this.totalQuestions) {
      this.currentIndex++;
      this.renderQuestion();
    } else {
      this.showResult();
    }
  },

  showResult() {
    this.el.gameArea.style.display = 'none';
    this.el.resultArea.style.display = 'block';

    const total = this.totalQuestions;
    const correct = this.score;
    const percent = Math.round((correct / total) * 100);
    this.el.finalScore.textContent = `${percent}%`;
    this.el.finalDetail.textContent = `Acertaste ${correct} de ${total} perguntas.`;

    // Estatísticas por tópico (aproximadas)
    const stats = {};
    this.filteredQuestions.forEach(q => {
      if (!stats[q.topic]) stats[q.topic] = { total: 0 };
      stats[q.topic].total++;
    });
    const topics = Object.keys(stats);
    if (topics.length > 1) {
      let html = '<div style="margin-top:0.5rem;font-weight:600;">Temas abrangidos:</div><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">';
      topics.forEach(t => {
        const count = stats[t].total;
        html += `<span style="background:#f1f5f9;padding:2px 12px;border-radius:16px;font-size:0.8rem;">${t} (${count})</span>`;
      });
      html += '</div>';
      this.el.perTopicStats.innerHTML = html;
    } else {
      this.el.perTopicStats.innerHTML = '';
    }

    this.el.resetBtn.style.display = 'inline-block';
  },

  resetQuiz() {
    this.loadQuestions(this.selectedTopic);
    this.currentIndex = 0;
    this.score = 0;
    this.el.resultArea.style.display = 'none';
    this.el.gameArea.style.display = 'block';
    this.el.resetBtn.style.display = 'none';
    this.renderQuestion();
  }
};

// Iniciar
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
